<main class="wrap" style="padding-top:34px"><section><h1>KPI Model</h1><p class="sub">Interactive planning model for go-to-market assumptions and conversion stages.</p></section>
<section><div class="input-grid"><div><label>Weekly impressions</label><input id="imp" type="number" value="25000" /></div><div><label>Engagement rate %</label><input id="eng" type="number" value="4" /></div><div><label>Conversation rate %</label><input id="conv" type="number" value="8" /></div><div><label>Demo rate %</label><input id="demo" type="number" value="22" /></div><div><label>Activation rate %</label><input id="act" type="number" value="18" /></div></div><button class="btn primary" onclick="calc()">Run Model</button><div id="out" class="result"></div></section></main>
  <footer class="footer wrap">GTM Strategy Draft · Tony Beal · <a href="https://tonybeal.net/">tonybeal.net</a></footer>
<script>
function pct(v){return Math.max(0,Number(v)||0)/100}
function n(v){return Math.max(0,Number(v)||0)}
function calc(){
 const impressions=n(document.getElementById('imp').value);
 const engaged=impressions*pct(document.getElementById('eng').value);
 const conversations=engaged*pct(document.getElementById('conv').value);
 const demos=conversations*pct(document.getElementById('demo').value);
 const activations=demos*pct(document.getElementById('act').value);
 document.getElementById('out').innerHTML=`<strong>Weekly GTM Output</strong><ul class="list"><li>Engaged audience: ${Math.round(engaged).toLocaleString()}</li><li>Conversations: ${Math.round(conversations).toLocaleString()}</li><li>Demos: ${Math.round(demos).toLocaleString()}</li><li><strong>New activations: ${Math.round(activations).toLocaleString()}</strong></li></ul>`;
}
calc();
</script>
</body></html>
