<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px; height: 630px; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #0A0F1E;
    }
    .card {
      width: 1200px; height: 630px;
      background: linear-gradient(135deg, #0A0F1E 0%, #0F1F3D 60%, #0A0F1E 100%);
      display: flex; align-items: center;
      padding: 0 80px;
      position: relative;
      overflow: hidden;
    }
    /* Background grid lines */
    .card::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,.06) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    /* Glow blob */
    .glow {
      position: absolute; top: -100px; right: 200px;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    /* Left: photo */
    .photo-wrap {
      position: relative; flex-shrink: 0;
      margin-right: 60px;
    }
    .photo {
      width: 200px; height: 200px; border-radius: 50%;
      border: 5px solid #3B82F6;
      object-fit: cover;
      box-shadow: 0 0 0 12px rgba(59,130,246,.12), 0 20px 60px rgba(0,0,0,.5);
      display: block;
    }
    .available-dot {
      position: absolute; bottom: 10px; right: 10px;
      width: 30px; height: 30px; border-radius: 50%;
      background: #10B981;
      border: 5px solid #0A0F1E;
    }
    /* Right: content */
    .content { flex: 1; position: relative; z-index: 1; }
    .eyebrow {
      font-size: 14px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: #60A5FA;
      margin-bottom: 12px;
    }
    .name {
      font-size: 72px; font-weight: 900; line-height: 1;
      color: #F1F5F9; letter-spacing: -.03em;
      margin-bottom: 10px;
    }
    .title {
      font-size: 22px; color: #94A3B8; font-weight: 400;
      margin-bottom: 32px;
    }
    /* Stats row */
    .stats { display: flex; gap: 32px; margin-bottom: 32px; }
    .stat-num {
      font-size: 30px; font-weight: 900; color: #60A5FA;
      line-height: 1;
    }
    .stat-label {
      font-size: 12px; color: #64748B;
      margin-top: 3px; line-height: 1.3;
    }
    .stat-divider {
      width: 1px; background: #1E2A3A; align-self: stretch;
    }
    /* Bottom bar */
    .bottom {
      display: flex; align-items: center; gap: 16px;
    }
    .tag {
      background: rgba(59,130,246,.15);
      border: 1px solid rgba(59,130,246,.3);
      color: #60A5FA; font-size: 13px; font-weight: 700;
      padding: 6px 16px; border-radius: 20px;
    }
    .tag-green {
      background: rgba(16,185,129,.15);
      border-color: rgba(16,185,129,.3);
      color: #10B981;
    }
    .url {
      margin-left: auto;
      font-size: 16px; font-weight: 700; color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>

    <div class="photo-wrap">
      <img src="https://tonybeal.net/headshot-final.png" class="photo" alt="Tony Beal" crossorigin="anonymous" />
      <div class="available-dot"></div>
    </div>

    <div class="content">
      <div class="eyebrow">Available Now · St. Louis Metro or Remote</div>
      <div class="name">Tony Beal</div>
      <div class="title">RevOps · Business Development · Sales Operations</div>

      <div class="stats">
        <div>
          <div class="stat-num">$20M+</div>
          <div class="stat-label">Pipeline Built</div>
        </div>
        <div class="stat-divider"></div>
        <div>
          <div class="stat-num">3,700+</div>
          <div class="stat-label">Accounts Managed</div>
        </div>
        <div class="stat-divider"></div>
        <div>
          <div class="stat-num">8 yrs</div>
          <div class="stat-label">Consecutive Quota</div>
        </div>
        <div class="stat-divider"></div>
        <div>
          <div class="stat-num">15+</div>
          <div class="stat-label">Years B2B</div>
        </div>
      </div>

      <div class="bottom">
        <span class="tag">RevOps Leader</span>
        <span class="tag">BD Strategy</span>
        <span class="tag tag-green">● Open to Conversations</span>
        <span class="url">tonybeal.net/now</span>
      </div>
    </div>
  </div>
</body>
</html>
