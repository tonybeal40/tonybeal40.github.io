<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tony Beal — Executive Package | Manufacturing Engineering &amp; Supplier Development Manager</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f5f4f1;font-family:'Inter',sans-serif;color:#1a1a1a;font-size:11.5px;line-height:1.7}

/* ── SAVE BAR (screen only) ── */
.save-bar{background:#0d1b2a;padding:10px 32px;display:flex;justify-content:flex-end;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.save-bar-label{color:#7ba7c2;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-right:auto}
.btn-save{background:#fff;color:#0d1b2a;border:none;padding:8px 20px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.5px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.15s;white-space:nowrap}
.btn-save:hover{background:#e8e4de}
.btn-save.primary{background:#e8f0ff;color:#0d1b2a}
.btn-save.primary:hover{background:#cfdaff}

/* ── PAGE WRAPPER ── */
.page-shell{max-width:850px;margin:0 auto;padding:32px 0;display:flex;flex-direction:column;gap:32px}

/* ══════════════════════════════════════════
   COVER PAGE
══════════════════════════════════════════ */
.cover{background:#fff;display:grid;grid-template-columns:220px 1fr;min-height:11in;box-shadow:0 2px 20px rgba(0,0,0,0.08)}
.cover-left{background:#0d1b2a;display:flex;flex-direction:column;align-items:center;padding:48px 24px 40px}
.cover-photo{width:150px;height:150px;border-radius:50%;object-fit:cover;object-position:center top;border:3px solid rgba(255,255,255,0.15);margin-bottom:24px}
.cover-name-block{text-align:center;margin-bottom:32px}
.cover-name{font-family:'Playfair Display',serif;font-size:22px;color:#fff;line-height:1.2;margin-bottom:6px}
.cover-title{font-size:10px;color:#7ba7c2;text-transform:uppercase;letter-spacing:1.5px;line-height:1.5}
.cover-stats-left{width:100%;margin-bottom:32px}
.csl-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column}
.csl-item:last-child{border-bottom:none}
.csl-n{font-family:'Playfair Display',serif;font-size:20px;color:#fff;line-height:1}
.csl-l{font-size:9px;color:#5a8aaa;text-transform:uppercase;letter-spacing:0.8px;margin-top:3px}
.cover-contacts{font-size:9.5px;color:#5a8aaa;display:flex;flex-direction:column;gap:6px;text-align:center}
.cover-contacts a{color:#7ba7c2;text-decoration:none}
.cover-right{padding:56px 52px;display:flex;flex-direction:column;justify-content:space-between}
.cover-eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#7ba7c2;margin-bottom:16px;font-weight:500}
.cover-headline{font-family:'Playfair Display',serif;font-size:38px;line-height:1.15;color:#0d1b2a;margin-bottom:8px}
.cover-sub{font-size:13px;color:#555;font-weight:300;margin-bottom:36px;line-height:1.6}
.cover-for{margin-bottom:48px}
.cover-for-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#aaa;margin-bottom:6px}
.cover-for-co{font-size:18px;font-weight:600;color:#0d1b2a;margin-bottom:2px}
.cover-for-role{font-size:12px;color:#555;font-weight:300}
.cover-divider{height:1px;background:#e8e4de;margin:0 0 40px}
.toc-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#aaa;margin-bottom:16px}
.toc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toc-item{display:flex;align-items:center;gap:10px}
.toc-n{width:24px;height:24px;background:#0d1b2a;color:#fff;font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toc-text{font-size:11px;color:#333;font-weight:400}
.cover-footer{font-size:9px;color:#aaa;border-top:1px solid #e8e4de;padding-top:16px;margin-top:auto}

/* ══════════════════════════════════════════
   DOCUMENTS
══════════════════════════════════════════ */
.doc{background:#fff;box-shadow:0 2px 20px rgba(0,0,0,0.08)}
.doc-hd{background:#0d1b2a;padding:28px 48px;display:flex;align-items:center;gap:20px}
.doc-num{font-family:'Playfair Display',serif;font-size:42px;color:rgba(255,255,255,0.12);line-height:1;min-width:56px}
.doc-type{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#7ba7c2;margin-bottom:4px}
.doc-title{font-family:'Playfair Display',serif;font-size:20px;color:#fff;line-height:1.2}
.doc-bd{padding:36px 48px}

/* ── LETTER STYLES ── */
.l-from-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #e8e4de}
.l-from-name{font-family:'Playfair Display',serif;font-size:22px;color:#0d1b2a}
.l-from-title{font-size:11px;color:#777;margin-top:3px}
.l-from-contact{font-size:10px;color:#555;text-align:right;line-height:1.8}
.l-from-contact a{color:#0d1b2a;text-decoration:none}
.l-date{font-size:11px;color:#888;margin-bottom:12px}
.l-to{font-size:11px;color:#1a1a1a;margin-bottom:16px;line-height:1.6}
.l-to strong{font-weight:600;color:#0d1b2a}
.l-sal{font-size:12px;font-weight:500;color:#0d1b2a;margin-bottom:14px}
.l-body p{font-size:10.8px;line-height:1.75;color:#2a2a2a;margin-bottom:12px}
.l-pull{background:#f8f7f4;border-left:3px solid #0d1b2a;padding:12px 16px;margin:14px 0;font-size:10.8px;line-height:1.7;color:#2a2a2a}
.l-pull strong{color:#0d1b2a}
.l-close{margin-top:18px;font-size:11px;color:#2a2a2a;line-height:1.7}
.l-sig{margin-top:20px;font-family:'Playfair Display',serif;font-size:18px;color:#0d1b2a}

/* ── BIO STYLES ── */
.bio-top{display:grid;grid-template-columns:140px 1fr;gap:32px;margin-bottom:32px;padding-bottom:28px;border-bottom:1px solid #e8e4de}
.bio-photo{width:120px;height:120px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid #e8e4de}
.bio-headline{font-family:'Playfair Display',serif;font-size:20px;color:#0d1b2a;margin-bottom:6px}
.bio-sub{font-size:11px;color:#777;margin-bottom:14px;text-transform:uppercase;letter-spacing:1px}
.bio-stats{display:flex;gap:24px;flex-wrap:wrap}
.bio-stat-n{font-family:'Playfair Display',serif;font-size:18px;color:#0d1b2a;line-height:1}
.bio-stat-l{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.bio-body p{font-size:11.5px;line-height:1.85;color:#2a2a2a;margin-bottom:16px}
.bio-pillars{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:28px}
.bp{background:#f8f7f4;padding:18px 20px;border-top:2px solid #0d1b2a}
.bp-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;color:#0d1b2a;margin-bottom:8px}
.bp-text{font-size:10.5px;color:#444;line-height:1.65}

/* ── ELEVATOR PITCH STYLES ── */
.pitch-intro{background:#f8f7f4;border-left:3px solid #0d1b2a;padding:10px 14px;margin-bottom:16px;font-size:10.5px;color:#555;font-style:italic}
.ep-scenario{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #e8e4de}
.ep-scenario:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.ep-q{font-family:'Playfair Display',serif;font-size:12.5px;color:#0d1b2a;margin-bottom:8px;font-style:italic}
.ep-a p{font-size:10.5px;line-height:1.65;color:#2a2a2a;margin-bottom:6px}

/* ── RESUME STYLES ── */
.resume-wrap{padding:28px 36px}
.r-header{display:grid;grid-template-columns:80px 1fr;gap:18px;margin-bottom:16px;padding-bottom:14px;border-bottom:2px solid #0d1b2a}
.r-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;object-position:center top}
.r-name{font-family:'Playfair Display',serif;font-size:22px;color:#0d1b2a;line-height:1}
.r-title{font-size:11px;color:#555;margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.r-contact{font-size:10px;color:#555;display:flex;gap:16px;flex-wrap:wrap;margin-top:8px}
.r-contact a{color:#0d1b2a;text-decoration:none}
.r-body{display:grid;grid-template-columns:1fr 185px;gap:20px}
.r-main{}
.r-sidebar{}
.r-section{margin-bottom:12px}
.r-section-label{font-size:8.5px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;color:#0d1b2a;border-bottom:1px solid #0d1b2a;padding-bottom:3px;margin-bottom:8px}
.r-profile{font-size:9.5px;line-height:1.6;color:#333}
.r-job{margin-bottom:8px}
.r-job-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.r-role{font-size:11px;font-weight:600;color:#0d1b2a}
.r-company{font-size:10px;color:#555;font-weight:400}
.r-date{font-size:9.5px;color:#888;white-space:nowrap}
.r-bullets{margin:4px 0 0 14px;padding:0}
.r-bullets li{font-size:9.5px;color:#333;line-height:1.5;margin-bottom:1px}
.r-skill{margin-bottom:8px}
.r-skill-name{font-size:10px;font-weight:500;color:#0d1b2a;margin-bottom:3px}
.r-skill-bar{height:3px;background:#e8e4de;border-radius:2px}
.r-skill-fill{height:100%;background:#0d1b2a;border-radius:2px}
.r-tag{display:inline-block;background:#f0ede8;font-size:9px;color:#333;padding:3px 8px;border-radius:2px;margin:2px 2px 2px 0;line-height:1.4}
.r-nums{font-size:9.5px;color:#333;line-height:2}
.r-avail{color:#059669;font-weight:600}

/* ══════════════════════════════════════════
   MOBILE
══════════════════════════════════════════ */
@media(max-width:700px){
  html,body{font-size:14px;overflow-x:hidden}
  .page-shell{padding:0;gap:0;max-width:100%}

  /* Save bar — full width, large touch targets */
  .save-bar{padding:10px 14px;flex-wrap:wrap;gap:8px;position:relative}
  .save-bar-label{font-size:10px;width:100%;margin-right:0;margin-bottom:2px}
  .btn-save{font-size:12px;padding:10px 16px;flex:1;justify-content:center;min-width:0}

  /* Cover page — stacked, centered */
  .cover{grid-template-columns:1fr;min-height:auto;box-shadow:none}
  .cover-left{padding:32px 24px 28px;flex-direction:column;align-items:center;gap:0}
  .cover-photo{width:100px;height:100px;margin-bottom:16px}
  .cover-name-block{text-align:center;margin-bottom:20px}
  .cover-name{font-size:22px}
  .cover-title{font-size:10px}
  .cover-stats-left{width:100%;display:grid;grid-template-columns:1fr 1fr;margin-bottom:20px}
  .csl-item{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,0.07)}
  .cover-contacts{flex-direction:column;align-items:center;gap:5px;font-size:11px}
  .cover-right{padding:28px 20px 32px}
  .cover-headline{font-size:26px;line-height:1.2}
  .cover-sub{font-size:13px;margin-bottom:24px}
  .cover-for-co{font-size:16px}
  .cover-for-role{font-size:12px}
  .toc-grid{grid-template-columns:1fr}
  .toc-text{font-size:12px}

  /* Doc header + body */
  .doc{box-shadow:none;border-top:1px solid #e8e4de}
  .doc-hd{padding:18px 20px;gap:14px}
  .doc-num{font-size:28px;min-width:36px}
  .doc-type{font-size:8px}
  .doc-title{font-size:16px}
  .doc-bd{padding:20px 20px}

  /* Cover letter */
  .l-from-row{flex-direction:column;gap:8px}
  .l-from-contact{text-align:left}
  .l-from-name{font-size:18px}
  .l-body p{font-size:13px;line-height:1.7}
  .l-pull{font-size:13px}

  /* Bio */
  .bio-top{grid-template-columns:1fr;gap:16px}
  .bio-photo{display:none}
  .bio-headline{font-size:18px}
  .bio-stats{gap:16px}
  .bio-body p{font-size:13px}
  .bio-pillars{grid-template-columns:1fr;gap:10px;margin-top:18px}
  .bp-text{font-size:13px}

  /* Elevator pitch */
  .ep-q{font-size:14px}
  .ep-a p{font-size:13px}

  /* Resume — clean single column */
  .resume-wrap{padding:20px 16px}
  .r-header{display:flex;flex-direction:column;align-items:flex-start;gap:10px;margin-bottom:14px;padding-bottom:12px}
  .r-photo{width:64px;height:64px}
  .r-name{font-size:20px}
  .r-title{font-size:10px;line-height:1.5}
  .r-contact{flex-direction:column;gap:4px;font-size:12px}
  .r-contact span{display:block}
  .r-body{grid-template-columns:1fr;gap:0}
  .r-sidebar{margin-top:16px;padding-top:16px;border-top:1px solid #e8e4de}
  .r-section{margin-bottom:14px}
  .r-section-label{font-size:9px;margin-bottom:6px}
  .r-profile{font-size:13px;line-height:1.65}
  .r-job{margin-bottom:10px}
  .r-job-header{flex-wrap:wrap;gap:2px}
  .r-role{font-size:13px}
  .r-company{font-size:12px}
  .r-date{font-size:11px;width:100%;margin-top:1px}
  .r-bullets li{font-size:12px;line-height:1.55;margin-bottom:3px}
  .r-skill{margin-bottom:8px}
  .r-skill-name{font-size:12px}
  .r-tag{font-size:11px;padding:4px 10px}
  .r-nums{font-size:13px;line-height:1.9}
}

/* ══════════════════════════════════════════
   PRINT
══════════════════════════════════════════ */
@media print{
  @page{margin:0.25in;size:letter portrait}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  html,body{background:#fff!important;padding:0!important;font-size:9.5px!important}
  .save-bar{display:none!important}
  .page-shell{padding:0;gap:0;max-width:100%}
  .cover{
    page-break-after:always!important;break-after:page!important;
    min-height:auto!important;height:10in;box-shadow:none;
    grid-template-columns:200px 1fr;
  }
  .cover-left{padding:32px 18px}
  .cover-right{padding:36px 36px}
  .cover-headline{font-size:30px}
  .cover-sub{font-size:11px}
  .doc{
    page-break-before:always!important;break-before:page!important;
    box-shadow:none!important;
    page-break-inside:auto;break-inside:auto;
    max-height:10in;overflow:hidden;
  }
  .doc-hd{padding:14px 32px!important;page-break-after:avoid!important;break-after:avoid!important}
  .doc-bd{padding:16px 32px!important}
  .doc-num{font-size:30px!important;min-width:42px!important}
  .doc-title{font-size:16px!important}
  .l-from-name{font-size:16px!important}
  .l-body p,.l-pull,.l-close{font-size:9px!important;line-height:1.55!important;margin-bottom:7px!important}
  .l-pull{padding:8px 12px!important;margin:8px 0!important}
  .bio-body p{font-size:9px!important;line-height:1.55!important;margin-bottom:8px!important}
  .bio-pillars{margin-top:14px!important;gap:10px!important}
  .bp{padding:10px 12px!important}
  .bp-text{font-size:9px!important;line-height:1.5!important}
  .ep-a p{font-size:9px!important;line-height:1.5!important}
  .ep-scenario{margin-bottom:10px!important;padding-bottom:10px!important}
  .ep-q{font-size:11px!important;margin-bottom:5px!important}
  .resume-wrap{padding:8px 16px!important}
  .r-header{margin-bottom:6px!important;padding-bottom:5px!important;gap:12px!important;grid-template-columns:52px 1fr!important}
  .r-photo{width:52px!important;height:52px!important}
  .r-name{font-size:15px!important}
  .r-title{font-size:8px!important;margin-top:2px!important}
  .r-contact{font-size:8px!important;gap:8px!important;margin-top:4px!important}
  .r-body{grid-template-columns:1fr 145px!important;gap:14px!important}
  .r-section{margin-bottom:5px!important}
  .r-section-label{font-size:7px!important;padding-bottom:2px!important;margin-bottom:4px!important}
  .r-profile{font-size:7.5px!important;line-height:1.45!important}
  .r-job{margin-bottom:4px!important}
  .r-role{font-size:8.5px!important}
  .r-company{font-size:8px!important}
  .r-date{font-size:7.5px!important}
  .r-bullets{margin:2px 0 0 12px!important}
  .r-bullets li{font-size:7.5px!important;line-height:1.35!important;margin-bottom:0!important}
  .r-skill-name{font-size:8px!important}
  .r-skill{margin-bottom:4px!important}
  .r-skill-bar{height:2px!important}
  .r-tag{font-size:7px!important;padding:1px 4px!important;margin:1px 1px!important}
  .r-nums{font-size:7.5px!important;line-height:1.6!important}
  .l-pull,.l-close,.l-from-row,.l-to,.l-sal,
  .bio-top,.bp,.bio-pillars,
  .ep-scenario,.ep-q,
  .r-job,.r-section,
  li,p{page-break-inside:avoid!important;break-inside:avoid!important}
  .ep-q{page-break-after:avoid!important;break-after:avoid!important}
  .doc-hd,.r-section-label,.bp-title{page-break-after:avoid!important;break-after:avoid!important}
  p{orphans:3;widows:3}
  .cover-footer{display:none}
  /* ── SELECTIVE PRINT ── */
  body.print-cl .cover,
  body.print-cl #sec-resume,
  body.print-cl #sec-bio,
  body.print-cl #sec-pitch,
  body.print-cl #sec-comp,
  body.print-cl #sec-qa{display:none!important}
  body.print-cl #sec-cl{page-break-before:avoid!important;break-before:avoid!important}
  body.print-resume .cover,
  body.print-resume #sec-cl,
  body.print-resume #sec-bio,
  body.print-resume #sec-pitch,
  body.print-resume #sec-comp,
  body.print-resume #sec-qa{display:none!important}
  body.print-resume #sec-resume{page-break-before:avoid!important;break-before:avoid!important}
  body.print-business .cover,
  body.print-business #sec-cl,
  body.print-business #sec-resume,
  body.print-business #sec-qa{display:none!important}
  body.print-business #sec-bio{page-break-before:avoid!important;break-before:avoid!important}
  body.print-qa .cover,
  body.print-qa #sec-cl,
  body.print-qa #sec-resume,
  body.print-qa #sec-bio,
  body.print-qa #sec-pitch,
  body.print-qa #sec-comp{display:none!important}
  body.print-qa #sec-qa{page-break-before:avoid!important;break-before:avoid!important}

      <div class="ep-q">01 &mdash; &ldquo;Tell me about yourself.&rdquo;</div>
      <div class="ep-a"><p>I am an industrial B2B professional with 15+ years in technical account management and post-sale execution in custom manufacturing. My career has been in environments where someone has to own the execution after the sale closes &mdash; coordinating between customer requirements, overseas suppliers, and internal teams. At ProForm Manufacturing, I built a $6M+ program from zero in custom industrial manufacturing, owning NPI coordination, FAI/PPAP quality management, and supplier development across a casting, machining, and fabrication supply base. At Natoli Engineering, I managed OEM-level technical accounts where delivery against specification was non-negotiable. I am 100% remote-capable, open to international travel, and looking for a role where I own outcomes.</p></div>
    </div>

    <div class="ep-scenario">
      <div class="ep-q">02 &mdash; &ldquo;Why this company?&rdquo;</div>
      <div class="ep-a"><p>You&rsquo;re doubling year over year and leadership is stepping back from execution to focus on growth. That means the post-sale execution gap is real, it&rsquo;s growing, and whoever fills this role will have direct impact on whether that growth compounds or breaks. I&rsquo;ve operated in exactly that environment &mdash; where the systems don&rsquo;t yet exist and someone has to build them while simultaneously managing customer programs. That&rsquo;s not a description of a challenge. It&rsquo;s a description of where I do my best work.</p></div>
    </div>

    <div class="ep-scenario">
      <div class="ep-q">03 &mdash; &ldquo;What separates you from candidates with deeper quality or supply chain credentials?&rdquo;</div>
      <div class="ep-a"><p>I come from execution. At ProForm, I wasn&rsquo;t handed a quality system &mdash; I built one while managing OEM accounts under real pressure. The FAI documentation, the PPAP coordination, the corrective action process between customer requirements and supplier capabilities &mdash; that was mine to own. What differentiates me isn&rsquo;t a specific degree or title. It&rsquo;s the combination of technical fluency with customers, commercial instincts, and systems thinking. I can hold credible conversations with engineers in time zones 12 hours away and still close an upsell conversation on the same account.</p></div>
    </div>

    <div class="ep-scenario">
      <div class="ep-q">04 &mdash; &ldquo;What is your approach to supplier development?&rdquo;</div>
      <div class="ep-a"><p>Start with visibility. You cannot improve what you cannot see. I build tracking systems first &mdash; delivery performance, quality escapes, corrective action status &mdash; before I start improving anything. Then I work with suppliers on root cause, not symptoms. The goal is always the same: reduce variance in delivery, quality, and communication so that customer programs don&rsquo;t absorb supplier-side chaos. That applies whether the supplier is in Ohio or Shenzhen.</p></div>
    </div>

    <div class="ep-scenario">
      <div class="ep-q">05 &mdash; &ldquo;Where do you see the biggest opportunity here?&rdquo;</div>
      <div class="ep-a"><p>Scalable execution infrastructure. A company doubling year over year has the revenue trajectory. The risk is that every new account adds manual coordination overhead. The opportunity is to build the program tracking, quality documentation, and supplier communication systems that make each new account easier to manage, not harder. I&rsquo;ve done that from zero before. That&rsquo;s the job.</p></div>

      <div style="font-size:12.5px;color:#2a2a2a;line-height:1.8">At ProForm, my role was on the commercial and coordination side rather than hands-on production. I worked directly with customers and internal teams on projects involving CNC machining and fabricated components, aligning customer requirements with shop capabilities, supporting quoting, and moving NPI through early stages including supplier coordination and first article submissions. At Natoli, I managed technical account relationships where customer requirements had to be translated into production action, which meant staying close to both the customer and the engineering side to keep things moving.</div>

      <div style="font-size:12.5px;color:#2a2a2a;line-height:1.8">I didn't directly own overseas supplier relationships, but I coordinated across stakeholders and time constraints regularly. I'm comfortable with off-hours communication and keeping corrective actions moving when you can't just walk to someone's desk. Staying organized, communicating clearly in writing, and not letting things stall while waiting on a time zone gap — that's the work, and I'm comfortable operating that way.</div>

      <div style="font-size:13px;font-weight:600;color:#0d1b2a;margin-bottom:14px;line-height:1.5">Can you provide examples of times you identified upsell opportunities or expanded existing accounts? How have you managed technical conversations with customers in those situations?</div>
      <div style="font-size:12.5px;color:#2a2a2a;line-height:1.8">At both ProForm and Natoli I grew accounts by staying close to the customer and asking the right questions. At ProForm, a big part of how the program scaled was identifying adjacent needs within existing accounts and positioning additional capabilities before the customer went looking elsewhere. I approach technical conversations by listening first, clarifying requirements, then aligning those needs with what we can actually deliver.</div>
