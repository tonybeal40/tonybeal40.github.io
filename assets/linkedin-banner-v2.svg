<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2563EB" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg)"/>
  <rect width="1584" height="396" fill="url(#glow)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#2563EB" fill-opacity="0.1"/>
  </pattern>
  <rect width="1584" height="396" fill="url(#dots)"/>

  <!-- RIGHT side accent line -->
  <rect x="1516" y="60" width="3" height="276" fill="url(#lineGrad)" rx="2"/>

  <!-- Available Now badge - top LEFT corner (profile photo is bottom left, this is safe) -->
  <rect x="60" y="36" width="164" height="36" rx="18" fill="rgba(52,211,153,0.12)" stroke="#34D399" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="82" cy="54" r="6" fill="#34D399"/>
  <text x="97" y="59" font-family="Arial" font-size="13" font-weight="700" fill="#34D399" letter-spacing="1.5">AVAILABLE NOW</text>

  <!-- ALL CONTENT ON RIGHT SIDE -->

  <!-- Overline -->
  <text x="1492" y="108" font-family="Arial" font-size="12" font-weight="700" fill="#60A5FA" letter-spacing="3" text-anchor="end">REVENUE OPERATIONS  ·  AI SALES SYSTEMS  ·  GTM STRATEGY</text>

  <!-- Name -->
  <text x="1492" y="192" font-family="Arial Black" font-size="80" font-weight="900" fill="url(#nameGrad)" letter-spacing="-2" text-anchor="end">Tony Beal</text>

  <!-- Tagline -->
  <text x="1492" y="238" font-family="Arial" font-size="20" fill="#94A3B8" text-anchor="end">Building AI-driven revenue systems that generate pipeline for B2B companies</text>

  <!-- Stat cards right-aligned group -->
  <rect x="812" y="264" width="148" height="58" rx="8" fill="rgba(37,99,235,0.14)" stroke="#2563EB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="886" y="287" font-family="Arial Black" font-size="20" font-weight="900" fill="#60A5FA" text-anchor="middle">$20M+</text>
  <text x="886" y="308" font-family="Arial" font-size="11" font-weight="700" fill="#64748B" text-anchor="middle" letter-spacing="1">PIPELINE</text>

  <rect x="972" y="264" width="148" height="58" rx="8" fill="rgba(99,102,241,0.14)" stroke="#6366F1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1046" y="287" font-family="Arial Black" font-size="20" font-weight="900" fill="#818CF8" text-anchor="middle">15+</text>
  <text x="1046" y="308" font-family="Arial" font-size="11" font-weight="700" fill="#64748B" text-anchor="middle" letter-spacing="1">YEARS B2B</text>

  <rect x="1132" y="264" width="148" height="58" rx="8" fill="rgba(52,211,153,0.1)" stroke="#34D399" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1206" y="287" font-family="Arial Black" font-size="20" font-weight="900" fill="#34D399" text-anchor="middle">11K+</text>
  <text x="1206" y="308" font-family="Arial" font-size="11" font-weight="700" fill="#64748B" text-anchor="middle" letter-spacing="1">FOLLOWERS</text>

  <rect x="1292" y="264" width="148" height="58" rx="8" fill="rgba(37,99,235,0.14)" stroke="#2563EB" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1366" y="287" font-family="Arial Black" font-size="20" font-weight="900" fill="#60A5FA" text-anchor="middle">3,700+</text>
  <text x="1366" y="308" font-family="Arial" font-size="11" font-weight="700" fill="#64748B" text-anchor="middle" letter-spacing="1">ACCOUNTS</text>

  <!-- Website -->
  <text x="1492" y="368" font-family="Arial" font-size="14" font-weight="600" fill="#334155" text-anchor="end" letter-spacing="1">tonybeal.net</text>

</svg>
